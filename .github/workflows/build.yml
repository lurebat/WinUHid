name: Build WinUHid

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build WinUHid
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        platform: [x86, x64, ARM64]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
      with:
        msbuild-architecture: x64

    - name: Install Windows Driver Kit
      run: |
        $wdkUrl = "https://download.microsoft.com/download/41fb59c2-1723-45f9-a270-96b73ad58233/KIT_BUNDLE_WDK_MEDIACREATION/wdksetup.exe"
        Invoke-WebRequest -Uri $wdkUrl -OutFile "$env:TEMP\wdksetup.exe"
        Start-Process -FilePath "$env:TEMP\wdksetup.exe" -ArgumentList "/quiet", "/norestart", "/ceip off" -Wait
      shell: pwsh

    - name: Restore NuGet packages
      run: msbuild -t:restore -p:RestorePackagesConfig=true

    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11

    - name: Install vcpkg MSBuild integration
      run: ${{ github.workspace }}/vcpkg/vcpkg.exe integrate install

    - name: Build solution
      run: msbuild WinUHid.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /m /verbosity:minimal

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: WinUHid-${{ matrix.configuration }}-${{ matrix.platform }}
        path: |
          build/${{ matrix.configuration }}/${{ matrix.platform }}/
          WinUHid/WinUHid.h