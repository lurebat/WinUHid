name: Build WinUHid

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build WinUHid
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
        platform: [x86, x64, ARM64]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v2
      with:
        msbuild-architecture: x64

    - name: Restore NuGet packages
      run: msbuild -t:restore -p:RestorePackagesConfig=true

    - name: Bootstrap vcpkg
      run: ${{ github.workspace }}/vcpkg/bootstrap-vcpkg.bat -disableMetrics

    - name: Install vcpkg MSBuild integration
      run: ${{ github.workspace }}/vcpkg/vcpkg.exe integrate install

    - name: Build solution
      run: msbuild WinUHid.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /m /verbosity:minimal

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        if-no-files-found: error
        name: WinUHid-${{ matrix.configuration }}-${{ matrix.platform }}
        path: |
          build/${{ matrix.configuration }}/${{ matrix.platform }}/WinUHid.*
          WinUHid/WinUHid.h
  web:
    name: Web crate (Rust)
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: web

    - name: Check formatting
      run: cargo fmt --manifest-path web/Cargo.toml --all -- --check

    - name: Run clippy
      run: cargo clippy --manifest-path web/Cargo.toml --all-targets -- -D warnings

    - name: Run tests
      run: cargo test --manifest-path web/Cargo.toml

    - name: Build release
      run: cargo build --manifest-path web/Cargo.toml --release